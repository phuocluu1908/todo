version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: user-mysql-prod
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD:-root}
      - MYSQL_DATABASE=${DB_NAME:-todo_db}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build: .
    image: todo-app:latest
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    container_name: todo-redis-prod
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - app-network

  auth:
    build:
      context: ./services/auth
      dockerfile: Dockerfile
    image: todo-auth:latest
    restart: unless-stopped
    env_file: services/auth/.env.example
    ports:
      - "3001:3001"
    networks:
      - app-network

  events:
    build:
      context: ./services/events
      dockerfile: Dockerfile
    image: todo-events:latest
    restart: unless-stopped
    env_file: services/events/.env.example
    depends_on:
      - redis
    ports:
      - "3002:3002"
    networks:
      - app-network

  zookeeper:
    image: bitnami/zookeeper:3
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes
    networks:
      - app-network

  kafka:
    image: bitnami/kafka:3
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_LISTENERS=PLAINTEXT://:9092
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - ALLOW_PLAINTEXT_LISTENER=yes
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    networks:
      - app-network

  audit:
    build:
      context: ./services/audit
      dockerfile: Dockerfile
    image: todo-audit:latest
    restart: unless-stopped
    env_file: services/audit/.env.example
    depends_on:
      - kafka
    ports:
      - "3003:3003"
    networks:
      - app-network

volumes:
  db_data:

networks:
  app-network:
    driver: bridge
