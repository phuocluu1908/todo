version: '3.8'

services:
  db:
    image: postgres:14
    container_name: user-postgres-prod
    restart: unless-stopped
    environment:
      - POSTGRES_PASSWORD=${DB_ROOT_PASSWORD:-root}
      - POSTGRES_DB=${DB_NAME:-todo_db}
      - POSTGRES_USER=${DB_USER:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build: .
    image: todo-app:latest
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    networks:
      - app-network

  auth:
    build:
      context: ./services/auth
      dockerfile: Dockerfile
    image: todo-auth:latest
    restart: unless-stopped
    env_file: services/auth/.env.example
    ports:
      - "3001:3001"
    networks:
      - app-network

  events:
    build:
      context: ./services/events
      dockerfile: Dockerfile
    image: todo-events:latest
    restart: unless-stopped
    env_file: services/events/.env.example
    depends_on:
      - redis
    ports:
      - "3002:3002"
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    container_name: todo-redis-prod
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - app-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - app-network

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    networks:
      - app-network

  audit:
    build:
      context: ./services/audit
      dockerfile: Dockerfile
    image: todo-audit:latest
    restart: unless-stopped
    env_file: services/audit/.env.example
    depends_on:
      - kafka
    ports:
      - "3003:3003"
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
