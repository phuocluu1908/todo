name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      DOCKER_REGISTRY: docker.io
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: yarn install

      - name: Run tests
        run: yarn test --silent

      - name: Build
        run: yarn build

  deploy:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ap-southeast-1
      AWS_ACCOUNT_ID: 861638088375
      STACK_NAME: todo-app-lowcost
      IMAGE_TAG: latest
      EC2_INSTANCE_ID: i-07261ffb50922572e
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
        id: login-ecr

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push main app image to ECR
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.STACK_NAME }}:${{ env.IMAGE_TAG }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.STACK_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Build and push auth service image to ECR
        uses: docker/build-push-action@v4
        with:
          context: ./services/auth
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.STACK_NAME }}-auth:${{ env.IMAGE_TAG }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.STACK_NAME }}-auth:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Deploy to EC2 via SSM
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          set -e

          IMAGE_URI="${ECR_REGISTRY}/${STACK_NAME}:${IMAGE_TAG}"
          AUTH_IMAGE_URI="${ECR_REGISTRY}/${STACK_NAME}-auth:${IMAGE_TAG}"

          # Build SSM parameters JSON using jq (avoids heredoc YAML conflicts)
          jq -n \
            --arg img "$IMAGE_URI" \
            --arg auth_img "$AUTH_IMAGE_URI" \
            --arg region "$AWS_REGION" \
            --arg registry "$ECR_REGISTRY" \
            '{commands: [
              "set -e",
              "set -a && . /opt/todo/.env && set +a",
              ("export IMAGE_URI=" + $img),
              ("export AUTH_IMAGE_URI=" + $auth_img),
              ("aws ecr get-login-password --region " + $region + " | docker login --username AWS --password-stdin " + $registry),
              "docker pull \"$IMAGE_URI\"",
              "docker pull \"$AUTH_IMAGE_URI\"",
              "docker rm -f todo-auth || true",
              "docker run -d --name todo-auth --restart unless-stopped --network todo-net -p 3001:3001 -e PORT=3001 -e JWT_SECRET=\"$JWT_SECRET\" -e DB_HOST=todo-db -e DB_PORT=5432 -e DB_USER=postgres -e DB_PASSWORD=\"$DB_PASSWORD\" -e DB_NAME=todo_db -e DB_SSL=false \"$AUTH_IMAGE_URI\"",
              "docker rm -f todo-app || true",
              "docker run -d --name todo-app --restart unless-stopped --network todo-net -p 80:3000 -e NODE_ENV=production -e PORT=3000 -e DB_TYPE=postgres -e DB_HOST=todo-db -e DB_PORT=5432 -e DB_USER=postgres -e DB_PASSWORD=\"$DB_PASSWORD\" -e DB_NAME=todo_db -e DB_SSL=false -e JWT_SECRET=\"$JWT_SECRET\" -v /opt/todo/data:/app/data \"$IMAGE_URI\"",
              "echo Backend services restarted successfully"
            ]}' > /tmp/ssm-deploy.json

          # Send command via SSM
          COMMAND_ID=$(aws ssm send-command \
            --region "$AWS_REGION" \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters file:///tmp/ssm-deploy.json \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          # Wait for command to complete (up to 5 minutes)
          for i in $(seq 1 150); do
            STATUS=$(aws ssm list-command-invocations \
              --command-id "$COMMAND_ID" \
              --region "$AWS_REGION" \
              --query "CommandInvocations[0].CommandPlugins[0].Status" \
              --output text 2>/dev/null || echo "NotReady")

            if [ "$STATUS" = "Success" ]; then
              echo "Backend deployment successful!"
              exit 0
            elif [ "$STATUS" = "Failed" ]; then
              echo "Backend deployment failed!"
              aws ssm list-command-invocations --command-id "$COMMAND_ID" --details --region "$AWS_REGION"
              exit 1
            fi

            sleep 2
          done

          echo "Deployment command timed out after 5 minutes"
          exit 1

      - name: Deployment notification
        if: success()
        run: echo "✅ Successfully deployed to production (EC2: ${{ env.EC2_INSTANCE_ID }})"

      - name: Deployment failure notification
        if: failure()
        run: echo "❌ Deployment failed - check logs above for details"
